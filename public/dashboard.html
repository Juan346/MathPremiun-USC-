<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Olimpiadas Matemáticas</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .navbar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 24px; font-weight: bold; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-info { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .score, .level { padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .score { background: #48bb78; }
        .level { background: #ed8936; }
        .logout { padding: 5px 15px; background: #e53e3e; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
        }
        .card h2 { margin-bottom: 20px; color: #667eea; border-left: 3px solid #667eea; padding-left: 10px; }
        
        /* ============ RANKING CON SCROLL ============ */
        .ranking-container {
            max-height: 400px;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: #667eea rgba(255,255,255,0.2);
        }
        
        .ranking-container::-webkit-scrollbar {
            width: 8px;
        }
        
        .ranking-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        
        .ranking-container::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }
        
        .ranking-container::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
        
        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        
        .ranking-item:hover {
            background: rgba(102,126,234,0.2);
            transform: translateX(5px);
        }
        
        .ranking-rank {
            font-weight: bold;
            min-width: 50px;
            font-size: 1.1em;
        }
        
        .ranking-name {
            flex: 1;
            margin: 0 10px;
            font-weight: 500;
        }
        
        .ranking-score {
            font-weight: bold;
            color: #48bb78;
            font-size: 1.1em;
            min-width: 80px;
            text-align: right;
        }
        
        .ranking-item.top-1 {
            background: linear-gradient(90deg, rgba(255,215,0,0.2), transparent);
            border-left: 3px solid #FFD700;
        }
        
        .ranking-item.top-2 {
            background: linear-gradient(90deg, rgba(192,192,192,0.2), transparent);
            border-left: 3px solid #C0C0C0;
        }
        
        .ranking-item.top-3 {
            background: linear-gradient(90deg, rgba(205,127,50,0.2), transparent);
            border-left: 3px solid #CD7F32;
        }
        
        .ranking-current-user {
            background: rgba(102,126,234,0.3);
            border-left: 3px solid #667eea;
            font-weight: bold;
        }
        
        .ranking-empty {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.7);
        }
        
        /* Fin estilos ranking */
        
        .create-section { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .create-section input, .create-section select {
            padding: 10px; border: none; border-radius: 8px; flex: 1;
            background: rgba(255,255,255,0.2); color: white;
        }
        .create-section input::placeholder { color: rgba(255,255,255,0.7); }
        .create-section button {
            padding: 10px 20px; background: #667eea; color: white;
            border: none; border-radius: 8px; cursor: pointer;
        }
        .room-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        .room-item:hover {
            background: rgba(255,255,255,0.15);
            transform: translateX(5px);
        }
        .join-btn { padding: 8px 20px; background: #48bb78; color: white; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; }
        .join-btn:hover { background: #38a169; transform: scale(1.02); }
        .join-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .empty { text-align: center; padding: 40px; color: rgba(255,255,255,0.7); }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .success { background: #48bb78; }
        .error { background: #f56565; }
        .info { background: #4299e1; }
        .status { font-size: 12px; padding: 4px 8px; border-radius: 12px; background: #48bb78; color: white; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .create-section { flex-direction: column; } }
        
        /* Carrusel de Premios */
        .rewards-section {
            grid-column: span 1;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }
        .rewards-section h2 {
            margin-bottom: 20px;
            text-align: center;
        }
        .carousel-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 20px;
        }
        .carousel-track {
            display: flex;
            transition: transform 0.5s ease;
            gap: 20px;
        }
        .reward-carousel-card {
            min-width: calc(33.333% - 14px);
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        .reward-carousel-card:hover {
            transform: translateY(-10px);
            background: linear-gradient(135deg, rgba(255,255,255,0.25), rgba(255,255,255,0.1));
        }
        .reward-carousel-card.redeemed {
            opacity: 0.6;
            filter: grayscale(0.3);
        }
        .reward-icon-large { font-size: 80px; margin-bottom: 20px; }
        .reward-name-large { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .reward-points-large { font-size: 20px; font-weight: bold; color: #fbbf24; margin-bottom: 10px; }
        .reward-description-large { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 15px; }
        .reward-value-large { font-size: 16px; color: #48bb78; margin-bottom: 20px; }
        .reward-progress { width: 100%; height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .reward-progress-bar { height: 100%; background: linear-gradient(90deg, #667eea, #48bb78); border-radius: 10px; transition: width 0.5s; }
        .redeem-carousel-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .redeem-carousel-btn:hover:not(:disabled) { background: #5a67d8; transform: scale(1.02); }
        .redeem-carousel-btn:disabled { background: #4a5568; cursor: not-allowed; }
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(102,126,234,0.8);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            color: white;
            transition: all 0.3s;
            z-index: 10;
        }
        .carousel-btn:hover { background: #667eea; transform: translateY(-50%) scale(1.1); }
        .carousel-btn.prev { left: 10px; }
        .carousel-btn.next { right: 10px; }
        
        .dots-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s;
        }
        .dot.active {
            background: #667eea;
            width: 25px;
            border-radius: 10px;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            border: 1px solid #667eea;
        }
        .redeem-code {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 18px;
            margin: 20px 0;
            word-break: break-all;
        }
        .copy-btn {
            background: #48bb78;
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        
        @media (max-width: 1000px) {
            .reward-carousel-card { min-width: calc(50% - 10px); }
        }
        @media (max-width: 700px) {
            .reward-carousel-card { min-width: calc(100% - 0px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <img src="https://www.usc.edu.co/wp-content/uploads/2026/03/Logo_Universidad-Santiago-de-Cali_.png" style="width: 5rem;" alt="">
            <div class="user-info">
                <span id="username"></span>
                <span class="score" id="score">0 pts</span>
                <span class="level" id="level">Nivel 1</span>
                <button class="logout" onclick="logout()">Salir</button>
            </div>
        </nav>
        
        <div class="grid">
            <div class="card">
                <h2>🏅 Ranking Global <span style="font-size:12px; color:#a0aec0;">(Top 10 + scroll)</span></h2>
                <div class="ranking-container" id="rankingContainer">
                    <div id="ranking"></div>
                </div>
            </div>
            
            <div class="card">
                <h2>🎮 Crear Sala</h2>
                <div class="create-section">
                    <input type="text" id="roomName" placeholder="Nombre de la sala">
                    <select id="categorySelect" style="background-color: #1a1a2e;">
                        <option value="">📚 Todas las categorías</option>
                        <option value="matematica_basica">🔢 Matemática Básica</option>
                        <option value="algebra">✖️ Álgebra</option>
                        <option value="geometria">🎨 Geometría 3D</option>
                        <option value="calculo">📈 Cálculo</option>
                        <option value="matematica_discreta">🎯 Matemática Discreta</option>
                        <option value="razonamiento_cuantitativo">🧠 Razonamiento Cuantitativo</option>
                    </select>
                    <select id="maxPlayers" style="background-color: #1a1a2e;">
                        <option value="2">2 jugadores</option>
                        <option value="4" selected>4 jugadores</option>
                        <option value="6">6 jugadores</option>
                    </select>
                    <button onclick="createRoom()">➕ Crear Sala</button>
                </div>
                <h2>🎮 Salas Disponibles</h2>
                <div id="rooms"></div>
            </div>
        </div>
        
        <!-- Sección de Premios con Carrusel -->
        <div class="rewards-section">
            <h2>🎁 Canjea tus Puntos por Premios Reales 🎁</h2>
            <div class="carousel-container">
                <button class="carousel-btn prev" onclick="prevSlide()">❮</button>
                <div class="carousel-track" id="carouselTrack"></div>
                <button class="carousel-btn next" onclick="nextSlide()">❯</button>
            </div>
            <div class="dots-container" id="dotsContainer"></div>
            <div style="text-align: center; margin-top: 15px;">
                <div class="reward-progress" style="max-width: 400px; margin: 0 auto;">
                    <div class="reward-progress-bar" id="globalProgressBar" style="width: 0%"></div>
                </div>
                <p style="font-size: 12px; margin-top: 10px;">💡 Acumula puntos jugando y canjea por premios reales</p>
            </div>
        </div>
    </div>

    <div id="redeemModal" style="display: none;">
        <div class="modal">
            <div class="modal-content">
                <div id="redeemIcon" style="font-size: 60px;"></div>
                <h2 id="redeemTitle"></h2>
                <p id="redeemMessage"></p>
                <div id="redeemCodeDisplay" class="redeem-code"></div>
                <button class="copy-btn" onclick="copyCode()">📋 Copiar Código</button>
                <button onclick="closeModal()" style="margin-top: 15px; padding: 8px 20px; background: #667eea; border: none; border-radius: 8px; cursor: pointer;">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        let socket = null;
        let user = null;
        let rewardsList = [];
        let currentCode = '';
        let currentSlide = 0;
        let currentReward = null;
        
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';
        
        try {
            user = JSON.parse(localStorage.getItem('user'));
            document.getElementById('username').textContent = user.username;
            document.getElementById('score').textContent = user.score + ' pts';
            document.getElementById('level').textContent = 'Nivel ' + user.level;
        } catch(e) { window.location.href = '/'; }
        
        async function loadRewards() {
            try {
                const res = await fetch('/api/rewards');
                rewardsList = await res.json();
                displayCarousel();
                updateGlobalProgress();
            } catch(e) { console.error('Error cargando premios:', e); }
        }
        
        function displayCarousel() {
            const track = document.getElementById('carouselTrack');
            const redeemedIds = (user.redeemedRewards || []).map(r => r.rewardId);
            
            track.innerHTML = rewardsList.map(reward => {
                const isRedeemed = redeemedIds.includes(reward.id);
                const progress = Math.min((user.score / reward.pointsRequired) * 100, 100);
                const canRedeem = user.score >= reward.pointsRequired && !isRedeemed;
                
                return `
                    <div class="reward-carousel-card ${isRedeemed ? 'redeemed' : ''}" data-reward-id="${reward.id}">
                        ${isRedeemed ? '<div style="position:absolute; top:10px; right:10px; background:#48bb78; padding:4px 8px; border-radius:20px; font-size:12px;">✔ Canjeado</div>' : ''}
                        <div class="reward-icon-large">${reward.icon}</div>
                        <div class="reward-name-large">${reward.name}</div>
                        <div class="reward-points-large">${reward.pointsRequired} pts</div>
                        <div class="reward-description-large">${reward.description}</div>
                        <div class="reward-value-large">💰 Valor: ${reward.realValue}</div>
                        <div class="reward-progress">
                            <div class="reward-progress-bar" style="width: ${progress}%"></div>
                        </div>
                        <div style="font-size:12px; margin-bottom:15px;">${user.score}/${reward.pointsRequired} pts</div>
                        <button class="redeem-carousel-btn" 
                            onclick="redeemReward(${reward.id})"
                            ${!canRedeem ? 'disabled' : ''}>
                            ${canRedeem ? '🎁 Canjear Ahora' : (isRedeemed ? '✓ Ya canjeado' : '🔒 Puntos insuficientes')}
                        </button>
                    </div>
                `;
            }).join('');
            
            updateDots();
            updateCarouselPosition();
        }
        
        function updateGlobalProgress() {
            const nextReward = rewardsList.find(r => r.pointsRequired > user.score);
            if (nextReward) {
                const progress = Math.min((user.score / nextReward.pointsRequired) * 100, 100);
                document.getElementById('globalProgressBar').style.width = `${progress}%`;
            } else {
                document.getElementById('globalProgressBar').style.width = '100%';
            }
        }
        
        function updateDots() {
            const container = document.getElementById('dotsContainer');
            container.innerHTML = '';
            for (let i = 0; i < rewardsList.length; i++) {
                const dot = document.createElement('div');
                dot.className = `dot ${i === currentSlide ? 'active' : ''}`;
                dot.onclick = () => goToSlide(i);
                container.appendChild(dot);
            }
        }
        
        function updateCarouselPosition() {
            const track = document.getElementById('carouselTrack');
            const slideWidth = document.querySelector('.reward-carousel-card')?.offsetWidth || 300;
            const gap = 20;
            const offset = -(currentSlide * (slideWidth + gap));
            track.style.transform = `translateX(${offset}px)`;
        }
        
        function nextSlide() {
            if (currentSlide < rewardsList.length - 1) {
                currentSlide++;
                updateDots();
                updateCarouselPosition();
            }
        }
        
        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                updateDots();
                updateCarouselPosition();
            }
        }
        
        function goToSlide(index) {
            currentSlide = index;
            updateDots();
            updateCarouselPosition();
        }
        
        async function redeemReward(rewardId) {
            const reward = rewardsList.find(r => r.id === rewardId);
            if (!reward) return;
            if (user.score < reward.pointsRequired) {
                showNotification(`❌ Necesitas ${reward.pointsRequired - user.score} puntos más`, 'error');
                return;
            }
            
            currentReward = reward;
            
            try {
                const res = await fetch('/api/redeem', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: user.id, rewardId })
                });
                const data = await res.json();
                if (res.ok) {
                    user.score = data.newScore;
                    document.getElementById('score').textContent = user.score + ' pts';
                    localStorage.setItem('user', JSON.stringify(user));
                    
                    document.getElementById('redeemIcon').textContent = reward.icon;
                    document.getElementById('redeemTitle').textContent = reward.name;
                    document.getElementById('redeemMessage').innerHTML = `🎉 ¡Felicidades! Canjeaste ${reward.name}`;
                    document.getElementById('redeemCodeDisplay').textContent = data.code;
                    document.getElementById('redeemModal').style.display = 'flex';
                    
                    loadRewards();
                    showNotification(data.message, 'success');
                } else {
                    showNotification(data.error, 'error');
                }
            } catch(e) { showNotification('Error al canjear', 'error'); }
        }
        
        function copyCode() {
            const code = document.getElementById('redeemCodeDisplay').textContent;
            navigator.clipboard.writeText(code);
            showNotification('📋 Código copiado al portapapeles', 'success');
        }
        
        function closeModal() {
            document.getElementById('redeemModal').style.display = 'none';
        }
        
        window.addEventListener('resize', () => updateCarouselPosition());
        
        function connect() {
            socket = io({
                auth: { token },
                transports: ['websocket', 'polling'],
                reconnection: true
            });
            
            socket.on('connect', () => {
                document.getElementById('status').textContent = '🟢 Conectado';
                document.getElementById('status').style.background = '#48bb78';
                socket.emit('get_rooms');
            });
            
            socket.on('disconnect', () => {
                document.getElementById('status').textContent = '🔴 Desconectado';
                document.getElementById('status').style.background = '#f56565';
            });
            
            socket.on('leaderboard_update', (data) => {
                const container = document.getElementById('ranking');
                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="ranking-empty">🏆 Sin puntuaciones</div>';
                    return;
                }
                
                // Mostrar hasta 10 jugadores con estilo mejorado
                container.innerHTML = data.map((u, i) => {
                    let rankIcon = '';
                    let rankClass = '';
                    if (i === 0) {
                        rankIcon = '🥇';
                        rankClass = 'top-1';
                    } else if (i === 1) {
                        rankIcon = '🥈';
                        rankClass = 'top-2';
                    } else if (i === 2) {
                        rankIcon = '🥉';
                        rankClass = 'top-3';
                    } else {
                        rankIcon = `${i + 1}`;
                    }
                    
                    const isCurrentUser = u.username === user.username;
                    
                    return `
                        <div class="ranking-item ${rankClass} ${isCurrentUser ? 'ranking-current-user' : ''}">
                            <div class="ranking-rank">${rankIcon}</div>
                            <div class="ranking-name">${u.username} ${isCurrentUser ? '<span style="font-size:10px; color:#667eea;">(tú)</span>' : ''}</div>
                            <div class="ranking-score">${u.score} pts</div>
                        </div>
                    `;
                }).join('');
            });
            
            socket.on('room_list_update', (rooms) => {
                const container = document.getElementById('rooms');
                if (!rooms || rooms.length === 0) {
                    container.innerHTML = '<div class="empty">🎮 No hay salas. ¡Crea una!</div>';
                    return;
                }
                container.innerHTML = rooms.map(room => `
                    <div class="room-item">
                        <div>
                            <strong>🏠 ${room.name}</strong>
                            ${room.category === 'geometria' ? '<span style="background:#667eea; padding:2px 6px; border-radius:10px; font-size:10px; margin-left:8px;">🎨 3D</span>' : ''}
                            <br><small>👥 ${room.players}/${room.maxPlayers}</small>
                        </div>
                        <button class="join-btn" onclick="joinRoom('${room.id}')" ${room.players >= room.maxPlayers ? 'disabled' : ''}>
                            ${room.players >= room.maxPlayers ? 'Llena' : 'Unirse'}
                        </button>
                    </div>
                `).join('');
            });
            
            socket.on('room_created', (data) => {
                showNotification('✅ Sala creada!', 'success');
                window.location.href = `/game.html?roomId=${data.roomId}`;
            });
            
            socket.on('room_joined', (data) => {
                showNotification('✅ Unido a la sala!', 'success');
                window.location.href = `/game.html?roomId=${data.roomId}`;
            });
            
            socket.on('new_reward_available', (data) => {
                showNotification(`🎁 ¡Nuevo premio disponible! Tienes ${data.userScore} puntos`, 'success');
                loadRewards();
            });
            
            socket.on('error', (data) => showNotification(data.message, 'error'));
        }
        
        function createRoom() {
            const name = document.getElementById('roomName').value.trim();
            const category = document.getElementById('categorySelect').value;
            if (!name) {
                showNotification('❌ Ingresa un nombre', 'error');
                return;
            }
            showNotification('🤖 Generando preguntas...', 'success');
            socket.emit('create_room', {
                name: name,
                maxPlayers: parseInt(document.getElementById('maxPlayers').value),
                category: category || null
            });
        }
        
        function joinRoom(roomId) { socket.emit('join_room', { roomId }); }
        function logout() { if (socket) socket.disconnect(); localStorage.clear(); window.location.href = '/'; }
        function showNotification(msg, type) {
            const div = document.createElement('div');
            div.className = `notification ${type}`;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        
        loadRewards();
        connect();
    </script>
</body>
</html>
