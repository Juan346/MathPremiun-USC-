<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Juego 3D - Olimpiadas Matemáticas</title>
    <script src="/socket.io/socket.io.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .game-info { font-size: 18px; font-weight: bold; }
        .timer {
            background: #667eea; padding: 10px 20px; border-radius: 10px;
            position: relative; overflow: hidden; color: white;
            min-width: 100px;
            text-align: center;
        }
        .timer-bar {
            position: absolute; left: 0; top: 0; height: 100%;
            background: rgba(255,255,255,0.3); transition: width 1s linear;
            width: 100%;
        }
        .main { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .main { grid-template-columns: 1fr; } }
        
        .question-area {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
        }
        .waiting-area {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 400px;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.3);
            border-top-color: #667eea; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .ready-btn, .start-btn {
            padding: 15px 30px; border: none; border-radius: 10px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            margin: 10px;
        }
        .ready-btn { background: #48bb78; color: white; }
        .ready-btn.ready { background: #ed8936; }
        .start-btn { background: #667eea; color: white; }
        .start-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .question-text { font-size: 24px; margin: 20px 0; }
        .options { display: grid; gap: 15px; margin-top: 20px; }
        .option {
            padding: 15px; background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 10px;
            cursor: pointer; text-align: left; font-size: 16px;
            transition: all 0.3s; color: white;
        }
        .option:hover:not(:disabled) { background: rgba(102,126,234,0.5); border-color: #667eea; }
        .text-answer {
            width: 100%; padding: 15px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px; font-size: 16px; margin-bottom: 10px;
            background: rgba(255,255,255,0.2); color: white;
        }
        .text-answer::placeholder { color: rgba(255,255,255,0.7); }
        .submit {
            width: 100%; padding: 12px; background: #667eea; color: white;
            border: none; border-radius: 10px; font-size: 16px; cursor: pointer;
        }
        
        .players-area {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
        }
        .player {
            display: flex; justify-content: space-between; padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .player.ready { background: rgba(72,187,120,0.3); }
        .player.host { background: rgba(237,137,54,0.3); border-left: 3px solid #ed8936; }
        .badge { font-size: 12px; padding: 2px 6px; border-radius: 10px; background: #48bb78; color: white; }
        
        .feedback {
            margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center;
            font-weight: bold;
        }
        .correct { background: rgba(72,187,120,0.3); color: #c6f6d5; }
        .incorrect { background: rgba(245,101,101,0.3); color: #fed7d7; }
        
        .voice-assistant {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: fadeIn 0.5s ease;
        }
        .voice-icon {
            font-size: 32px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex;
            justify-content: center; align-items: center; z-index: 1000;
            overflow-y: auto; padding: 20px;
        }
        .modal-content {
            background: #1a1a2e; padding: 40px; border-radius: 20px;
            max-width: 800px; width: 100%; max-height: 90vh;
            overflow-y: auto; color: white;
        }
        .notification {
            position: fixed; top: 20px; right: 20px; padding: 12px 20px;
            border-radius: 8px; color: white; font-weight: bold;
            z-index: 1000; animation: slideIn 0.3s ease;
        }
        .success { background: #48bb78; }
        .error { background: #f56565; }
        .info { background: #4299e1; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { font-size: 12px; padding: 4px 8px; border-radius: 12px; background: #48bb78; color: white; margin-left: 10px; }
        .question-number { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 10px; }
        
        .geometry-canvas {
            width: 100%;
            height: 300px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        canvas { width: 100% !important; height: 100% !important; }
        
        .explanation-item {
            background: rgba(255,255,255,0.1);
            margin: 15px 0;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #48bb78;
        }
        .explanation-item.wrong-answer { border-left-color: #f56565; }
        details summary {
            cursor: pointer;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-weight: bold;
        }
        .download-btn {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        .voice-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        .voice-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="game-info">
                <span id="roomId"></span>
                <span id="questionCounter" class="question-number"></span>
            </div>
            <div>
                <span id="status" class="status">🟢 Conectado</span>
                <div class="timer">
                    <div class="timer-bar" id="timerBar"></div>
                    <span id="timerText">30s</span>
                </div>
            </div>
        </div>
        
        <div class="main">
            <div id="gameArea" class="question-area">
                <div class="waiting-area">
                    <div class="spinner"></div>
                    <h2>🎮 Sala de Espera</h2>
                    <p>Esperando jugadores...</p>
                    <button id="readyBtn" class="ready-btn" onclick="toggleReady()">👍 Estoy Listo</button>
                    <div id="readyInfo"></div>
                    <button id="startBtn" class="start-btn" style="display:none;" onclick="startGame()">🚀 Iniciar Juego 3D</button>
                </div>
            </div>
            
            <div class="players-area">
                <h3>🏆 Jugadores</h3>
                <div id="playersList"></div>
            </div>
        </div>
        
        <div id="endModal" style="display:none;">
            <div class="modal">
                <div class="modal-content">
                    <h2>🏆 ¡Juego Terminado! 🏆</h2>
                    <div id="winner"></div>
                    <div id="finalScores"></div>
                    <div id="learningSummary"></div>
                    <button class="download-btn" onclick="downloadReport()">📥 Descargar Reporte</button>
                    <button onclick="returnHome()" style="margin-top:10px; padding:10px 20px; background:#667eea; border:none; border-radius:8px; color:white;">Volver</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';
        
        let scene, camera, renderer, controls, currentModel = null;
        
        function init3D() {
            const container = document.getElementById('geometry-canvas');
            if (!container) return;
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);
            
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.innerHTML = '';
            container.appendChild(renderer.domElement);
            
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 2;
            controls.enableZoom = true;
            
            // Luces
            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            const backLight = new THREE.PointLight(0x4466cc, 0.5);
            backLight.position.set(-2, 1, -3);
            scene.add(backLight);
            
            // Grid helper
            const gridHelper = new THREE.GridHelper(20, 20, 0x888888, 0x444444);
            scene.add(gridHelper);
            
            animate();
        }
        
        function animate() {
            if (!renderer) return;
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }
        
        function createCube(size) {
            const geometry = new THREE.BoxGeometry(size, size, size);
            const material = new THREE.MeshStandardMaterial({ color: 0x667eea, metalness: 0.3, roughness: 0.2 });
            const cube = new THREE.Mesh(geometry, material);
            cube.castShadow = true;
            cube.receiveShadow = true;
            return cube;
        }
        
        function createSphere(radius) {
            const geometry = new THREE.SphereGeometry(radius, 32, 32);
            const material = new THREE.MeshStandardMaterial({ color: 0x48bb78, metalness: 0.2, roughness: 0.3 });
            const sphere = new THREE.Mesh(geometry, material);
            sphere.castShadow = true;
            return sphere;
        }
        
        function createCylinder(radius, height) {
            const geometry = new THREE.CylinderGeometry(radius, radius, height, 32);
            const material = new THREE.MeshStandardMaterial({ color: 0xed8936, metalness: 0.4, roughness: 0.2 });
            const cylinder = new THREE.Mesh(geometry, material);
            cylinder.castShadow = true;
            return cylinder;
        }
        
        function createPyramid(size) {
            const geometry = new THREE.ConeGeometry(size * 0.7, size, 4);
            const material = new THREE.MeshStandardMaterial({ color: 0xf56565, metalness: 0.3, roughness: 0.2 });
            const pyramid = new THREE.Mesh(geometry, material);
            pyramid.castShadow = true;
            return pyramid;
        }
        
        function display3DFigure(geometryData) {
            if (!scene) init3D();
            if (currentModel) scene.remove(currentModel);
            
            let model;
            switch(geometryData?.type) {
                case 'cube':
                    model = createCube(geometryData.params?.size || 2);
                    break;
                case 'sphere':
                    model = createSphere(geometryData.params?.radius || 1.5);
                    break;
                case 'cylinder':
                    model = createCylinder(geometryData.params?.radius || 1, geometryData.params?.height || 3);
                    break;
                case 'pyramid':
                    model = createPyramid(geometryData.params?.size || 2);
                    break;
                default:
                    model = createCube(2);
            }
            
            if (model) {
                scene.add(model);
                currentModel = model;
                // Ajustar cámara
                camera.position.set(4, 3, 5);
                controls.target.set(0, 0, 0);
            }
        }
        
        window.display3DFigure = display3DFigure;
    </script>
    
    <script type="text/javascript">
        let socket = null;
        let roomId = null;
        let user = null;
        let timer = null;
        let canAnswer = true;
        let currentQuestion = null;
        let isHost = false;
        let gameActive = false;
        let isReady = false;
        let gameResults = null;
        let speechSynthesisEnabled = false;
        
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/';
        
        try {
            user = JSON.parse(localStorage.getItem('user'));
        } catch(e) { window.location.href = '/'; }
        
        function getRoomId() {
            return new URLSearchParams(window.location.search).get('roomId');
        }
        
        function speak(text) {
            if (!speechSynthesisEnabled) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-ES';
            utterance.rate = 0.9;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        
        function showVoiceAssistant(message) {
            const container = document.getElementById('voice-assistant-container');
            if (!container) return;
            container.innerHTML = `
                <div class="voice-assistant">
                    <div class="voice-icon">🎤</div>
                    <div style="flex:1">${message}</div>
                    <button class="voice-btn" onclick="speak('${message.replace(/'/g, "\\'")}')">🔊</button>
                </div>
            `;
            setTimeout(() => {
                if (container.firstChild) container.firstChild.style.opacity = '0';
                setTimeout(() => container.innerHTML = '', 3000);
            }, 5000);
            speak(message);
        }
        
        function connect() {
            socket = io({
                auth: { token },
                transports: ['websocket', 'polling'],
                reconnection: true
            });
            
            socket.on('connect', () => {
                document.getElementById('status').textContent = '🟢 Conectado';
                document.getElementById('status').style.background = '#48bb78';
                roomId = getRoomId();
                if (roomId) {
                    document.getElementById('roomId').textContent = `Sala: ${roomId}`;
                    socket.emit('join_room', { roomId });
                }
            });
            
            socket.on('disconnect', () => {
                document.getElementById('status').textContent = '🔴 Desconectado';
                document.getElementById('status').style.background = '#f56565';
            });
            
            socket.on('room_joined', () => showNotification('✅ Conectado a la sala', 'success'));
            
            socket.on('room_state_update', (data) => {
                updatePlayers(data.players, data.readyPlayers);
                updateReadyStatus(data.readyPlayers, data.players.length);
                if (data.hostId === user.id && !gameActive) {
                    isHost = true;
                    const startBtn = document.getElementById('startBtn');
                    startBtn.style.display = 'block';
                    const allReady = data.players.length > 1 && data.readyPlayers.length === data.players.length;
                    startBtn.disabled = !allReady;
                }
                if (data.currentQuestionNumber && data.maxQuestions) {
                    document.getElementById('questionCounter').textContent = `Pregunta ${data.currentQuestionNumber}/${data.maxQuestions}`;
                }
            });
            
            socket.on('game_started', (data) => {
                gameActive = true;
                showNotification(`🎮 ¡Juego comenzado! ${data.totalQuestions} preguntas`, 'success');
                switchToGame();
            });
            
            socket.on('new_question', (data) => {
                currentQuestion = data.question;
                displayQuestion(data);
                startTimer(data.question.timeLimit);
                canAnswer = true;
                enableOptions(true);
                document.getElementById('questionCounter').textContent = `Pregunta ${data.questionNumber}/${data.totalQuestions}`;
                document.getElementById('feedbackArea').innerHTML = '';
                
                // Mostrar figura 3D si es geometría
                if (data.question.geometry3D && window.display3DFigure) {
                    setTimeout(() => window.display3DFigure(data.question.geometry3D), 100);
                }
            });
            
            socket.on('answer_result', (data) => {
                stopTimer();
                if (data.correct) {
                    showFeedback(`✅ ¡Correcto! +${data.points} pts`, 'correct');
                } else {
                    showFeedback(`❌ Incorrecto`, 'incorrect');
                }
                canAnswer = false;
                enableOptions(false);
            });
            
            socket.on('voice_assistance', (data) => {
                showVoiceAssistant(data.message);
            });
            
            socket.on('score_update', (data) => updateScores(data.scores));
            socket.on('game_ended', (data) => { gameResults = data; showGameEnd(data); });
            socket.on('player_left', (data) => showNotification(`👋 ${data.username} abandonó`, 'error'));
            socket.on('error', (data) => showNotification(data.message, 'error'));
        }
        
        function updatePlayers(players, readyPlayers) {
            const container = document.getElementById('playersList');
            container.innerHTML = players.map((p, i) => `
                <div class="player ${readyPlayers.includes(p.id) ? 'ready' : ''} ${i === 0 ? 'host' : ''}">
                    <span>${i === 0 ? '👑' : '👤'} ${p.username}</span>
                    <span>${readyPlayers.includes(p.id) ? '<span class="badge">✓ Listo</span>' : '<span class="badge" style="background:#ccc;">⌛</span>'} ${p.score} pts</span>
                </div>
            `).join('');
        }
        
        function updateScores(scores) {
            const container = document.getElementById('playersList');
            container.innerHTML = scores.map((p, i) => `
                <div class="player ${i === 0 ? 'host' : ''}">
                    <span>${i === 0 ? '👑' : '👤'} ${p.username}</span>
                    <span style="color:#48bb78;">${p.score} pts</span>
                </div>
            `).join('');
        }
        
        function updateReadyStatus(readyPlayers, total) {
            const info = document.getElementById('readyInfo');
            info.innerHTML = `<div style="margin-top:15px;">Listos: ${readyPlayers.length}/${total}</div>`;
        }
        
        function toggleReady() {
            if (gameActive) return;
            isReady = !isReady;
            const btn = document.getElementById('readyBtn');
            btn.textContent = isReady ? '✅ Listo!' : '👍 Estoy Listo';
            btn.classList.toggle('ready', isReady);
            socket.emit('player_ready', { roomId, ready: isReady });
        }
        
        function startGame() {
            if (isHost && !gameActive) socket.emit('start_game', { roomId });
        }
        
        function switchToGame() {
            const area = document.getElementById('gameArea');
            area.innerHTML = `
                <div id="geometry-canvas" class="geometry-canvas"></div>
                <div id="questionText"></div>
                <div id="optionsArea" class="options"></div>
                <div id="feedbackArea"></div>
                <div id="voice-assistant-container"></div>
            `;
            // Inicializar 3D después de agregar el canvas
            setTimeout(() => {
                if (typeof init3D === 'function') window.init3D = init3D;
                if (window.init3D) window.init3D();
            }, 100);
        }
        
        function displayQuestion(data) {
            const q = data.question;
            document.getElementById('questionText').innerHTML = `<div class="question-text">${escapeHtml(q.text)}</div>`;
            
            const optionsDiv = document.getElementById('optionsArea');
            if (q.options && q.options.length) {
                optionsDiv.innerHTML = q.options.map(opt => `
                    <button class="option" onclick="submitAnswer('${escapeHtml(opt).replace(/'/g, "\\'")}')">${escapeHtml(opt)}</button>
                `).join('');
            } else {
                optionsDiv.innerHTML = `
                    <input type="text" id="textAnswer" class="text-answer" placeholder="Escribe tu respuesta...">
                    <button class="submit" onclick="submitAnswer()">Responder</button>
                `;
            }
        }
        
        function submitAnswer(answer) {
            if (!canAnswer || !gameActive) return;
            let userAnswer = answer;
            if (!userAnswer) {
                const input = document.getElementById('textAnswer');
                if (input) userAnswer = input.value;
            }
            if (!userAnswer && userAnswer !== 0) return;
            
            // Solicitar asistente de voz
            socket.emit('request_voice_assistance', {
                roomId,
                question: currentQuestion.text,
                userAnswer: userAnswer.toString(),
                isCorrect: false
            });
            
            socket.emit('submit_answer', {
                roomId,
                answer: userAnswer.toString().trim(),
                questionId: currentQuestion.id
            });
            canAnswer = false;
            enableOptions(false);
        }
        
        function enableOptions(enable) {
            document.querySelectorAll('.option, .submit, #textAnswer').forEach(el => {
                if (el.tagName === 'BUTTON') el.disabled = !enable;
                if (el.tagName === 'INPUT') el.disabled = !enable;
            });
        }
        
        function startTimer(seconds) {
            let timeLeft = seconds;
            const bar = document.getElementById('timerBar');
            const text = document.getElementById('timerText');
            if (timer) clearInterval(timer);
            bar.style.width = '100%';
            text.textContent = `${seconds}s`;
            timer = setInterval(() => {
                timeLeft--;
                text.textContent = `${timeLeft}s`;
                const percent = (timeLeft / seconds) * 100;
                bar.style.width = `${Math.max(0, percent)}%`;
                if (timeLeft <= 5) bar.style.background = '#f56565';
                if (timeLeft <= 0) clearInterval(timer);
            }, 1000);
        }
        
        function stopTimer() { if (timer) clearInterval(timer); }
        
        function showFeedback(msg, type) {
            const div = document.getElementById('feedbackArea');
            div.innerHTML = `<div class="feedback ${type}">${msg}</div>`;
        }
        
        function showGameEnd(data) {
            const modal = document.getElementById('endModal');
            document.getElementById('winner').innerHTML = `
                <div style="font-size:48px;">🏆</div>
                <h3>¡${escapeHtml(data.winner.username)} es el ganador!</h3>
                <p>${data.winner.score} puntos</p>
            `;
            document.getElementById('finalScores').innerHTML = `
                <h4>Ranking Final:</h4>
                ${data.finalScores.map((s, i) => `
                    <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid rgba(255,255,255,0.2);">
                        <span>${i+1}. ${escapeHtml(s.username)}</span>
                        <span style="color:#48bb78;">${s.score} pts</span>
                    </div>
                `).join('')}
            `;
            
            const currentUserData = data.finalScores.find(s => s.username === user.username);
            const userAnswers = currentUserData?.answers || [];
            
            let learningHtml = '<h4 style="margin-top:20px;">📚 Resumen de Aprendizaje</h4>';
            userAnswers.forEach((ans, idx) => {
                learningHtml += `
                    <div class="explanation-item ${ans.isCorrect ? '' : 'wrong-answer'}">
                        <div><strong>Pregunta ${idx + 1}:</strong> ${escapeHtml(ans.question)}</div>
                        <div><strong>Tu respuesta:</strong> ${escapeHtml(ans.userAnswer)}</div>
                        <div><strong>Respuesta correcta:</strong> ${escapeHtml(ans.correctAnswer)}</div>
                        <div><strong>Resultado:</strong> ${ans.isCorrect ? '✅ Correcta' : '❌ Incorrecta'}</div>
                        <details>
                            <summary>📖 Ver explicación</summary>
                            <div style="margin-top:10px;">
                                <p>${escapeHtml(ans.explanation)}</p>
                                ${ans.steps ? `<div><strong>Pasos:</strong><ul>${ans.steps.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ul></div>` : ''}
                                ${ans.hint ? `<div><strong>💡 Pista:</strong> ${escapeHtml(ans.hint)}</div>` : ''}
                            </div>
                        </details>
                    </div>
                `;
            });
            document.getElementById('learningSummary').innerHTML = learningHtml;
            modal.style.display = 'flex';
            stopTimer();
            gameActive = false;
        }
        
        function downloadReport() {
            if (!gameResults) return;
            const report = {
                usuario: user.username,
                fecha: new Date().toISOString(),
                puntaje: gameResults.finalScores.find(s => s.username === user.username)?.score || 0,
                respuestas: gameResults.finalScores.find(s => s.username === user.username)?.answers || []
            };
            const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `reporte_${user.username}_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function showNotification(msg, type) {
            const div = document.createElement('div');
            div.className = `notification ${type}`;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function returnHome() { window.location.href = '/dashboard.html'; }
        
        // Habilitar voz
        speechSynthesisEnabled = true;
        connect();
    </script>
</body>
</html>
